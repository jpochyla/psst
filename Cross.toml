[build]
pre-build = ["""
    dpkg --add-architecture $CROSS_DEB_ARCH && \
    apt-get update && \
    apt-get install --assume-yes --no-install-recommends --download-only \
        libgtk-3-dev:$CROSS_DEB_ARCH \
        libssl-dev:$CROSS_DEB_ARCH \
        libasound2-dev:$CROSS_DEB_ARCH && \
    dpkg --unpack --force-depends /var/cache/apt/archives/*.deb && \
    test -n "$(ls /usr/lib/*/pkgconfig/glib-2.0.pc 2>/dev/null)"
"""]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:edge"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"
